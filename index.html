<script>
// Self-heal: this org's GitHub Pages projects share ONE origin
// (<org>.github.io), so a service worker left behind by a sibling project
// can hijack navigations and serve the wrong app. Unregister any worker that
// isn't Shomer Forest's, then continue to the app.
(function () {
  var BASE = location.pathname.replace(/index\.html$/, '');
  // Cache-bust the app shell so a stale HTTP/SW copy can never pin an old build.
  var go = function () {
    var sep = location.search ? '&' : '?';
    location.replace('forest.html' + location.search + sep + 'v=' + Date.now() + location.hash);
  };
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function (regs) {
      var jobs = regs
        .filter(function (r) { return r.scope.indexOf(location.origin + BASE) !== 0; })
        .map(function (r) { return r.unregister(); });
      return Promise.all(jobs);
    }).catch(function () {}).then(go);
  } else { go(); }
  setTimeout(go, 1500); // hard fallback
})();
</script>
